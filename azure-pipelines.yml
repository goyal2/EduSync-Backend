# Azure Pipeline for EduSync Backend
# Builds and deploys the ASP.NET Core backend to Azure App Service

trigger:
- master  # Your main branch is named 'master'

pool:
  vmImage: 'windows-latest'  # Using Windows since your project appears to be Windows-based

variables:
  solution: 'EduSyncWebApi.sln'
  buildConfiguration: 'Release'
  dotNetVersion: '8.0.x'  # Using .NET 8 based on your project
  azureAppServiceName: 'somyaprojectwebapp'  # Based on your publish profile name

steps:
- task: UseDotNet@2
  inputs:
    version: $(dotNetVersion)
    includePreviewVersions: false
  displayName: 'Use .NET $(dotNetVersion)'

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

- task: NuGetCommand@2
  inputs:
    command: 'restore'
    restoreSolution: '$(solution)'
  displayName: 'NuGet Restore'

- task: DotNetCoreBuild@1
  inputs:
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration)'
  displayName: 'Build Solution'

- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    projects: '**/Testing/*.csproj'
    arguments: '--configuration $(buildConfiguration) --collect "Code coverage"'
  displayName: 'Run Tests'
  continueOnError: true  # Allow pipeline to continue even if tests fail

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    publishWebProjects: true
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true
  displayName: 'Publish Project'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
  displayName: 'Publish Artifacts'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Azure subscription 1'  # Update this to match your Azure service connection name
    appName: '$(azureAppServiceName)'
    package: '$(Build.ArtifactStagingDirectory)/**/*.zip'
    deploymentMethod: 'auto'
  displayName: 'Deploy to Azure App Service' 